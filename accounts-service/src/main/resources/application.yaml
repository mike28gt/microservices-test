server:
  port: 8082

spring:
  application:
    name: accounts-service

  datasource:
    url: jdbc:postgresql://localhost:5434/accounts_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true